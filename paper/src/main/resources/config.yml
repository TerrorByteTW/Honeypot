# File version (do NOT edit):
file-version: 28

######################################################################
#                     P L U G I N   S E T T I N G S                  #
######################################################################

#Testing haha lol
testing-parameter: true

# This setting enables whether some potentially unnecessary events are enabled.
# Leaving these off won't reduce the functionality of Honeypot, but if enabled can trigger events to process without player interaction
# A full list of events that are considered "extra" is here: https://github.com/TerrorByteTW/Honeypot/wiki/Extra-Events
enable-extra-events: false

# The number of honeypot blocks a player is allowed to break before any action is taken. Default is 1 (immediate action)
blocks-broken-before-action-taken: 1

# Allow players to break Honeypot blocks. If set to true, 
# an action will *NOT* trigger until a player hits the blocks-broken-before-action-taken value, and the Honeypot will be silently removed (Since it was broken, obvi)
# If you want action to take on all Honeypots, regardless if players can remove them or not, be sure to set blocks-broken-before-action-taken to 1.
allow-player-destruction: true

# Allow honeypot blocks to be blown up (TnT, Creepers, Ghasts, etc.). Default is false
allow-explode: false

# Allow enderman to pick up Honeypot blocks. Default is false
allow-enderman: false

container-actions:
  # Enable actions when a player opens any container (excluding entity containers like Donkeys and Villagers)
  enable-container-actions: true
  # If you want to use InventoryClickEvents instead of PlayerInteractEvent, set to true. Defaults to false
  # InventoryClickEvents happen on interacting with the inventory; PlayerInteractEvent happens upon players attempting to open the inventory
  use-inventory-click: false
  # Only trigger actions if inventory clicks are set to true and items are taken. This allows players to still deposit items into a Honeypot inventory. Defaults to true.
  only-trigger-on-withdrawal: true

# Enable players to still open inventories if container actions are enabled. Always true if use-inventory-click is true. Defaults to false
# Essentially what this means is, if use-inventory-click is false and enable-container-actions are true, then a Honeypot will trigger upon opening the inventory,
# but the inventory will still open and the player can still take or leave items.
always-allow-container-access: false

# Range in which /honeypot locate and /honeypot remove near (And their GUIs) will search
search-range: 5

# Removes Honeypots from storage if their corresponding blocks no longer exist (e.g., are air).
# This used to require a restart to change, but now updates with /honeypot reload
# enabled: Check for ghost pots periodically.
# check-interval: How often to check for ghost pots, in MINUTES. 20 minutes = 1 Minecraft day.
ghost-honeypot-checker:
  enable: true
  check-interval: 20

# Enable more detailed logging, stored in a honeypot.log file in the Honeypot folder
enable-logging: true

# Silences more noisy log messages, such as events from non-player triggered actions (Pistons, leaf decay, etc.) or log messages that occur frequently
# This only applies to DEBUG log messages, INFO, WARNING, etc. messages are not affected
silence-noisy-logs: false

# Enable Discord Webhooks. This will send messages to Discord via your webhook URL if a Honeypot is broken and/or activated
# Change "send-when" to "onbreak" when you want to be notified of all breaks (Including when action is taken).
# Change it to "action" if you want to be notified of only actions taken
# If none of these match. the default will be "action"
discord:
  enable: false
  url: "https://www.example.com"
  send-when: action

######################################################################
#                      C H A T   S E T T I N G S                     #
######################################################################

# Select your language. Current supported languages are: [en_US, es_MX, fr_FR, ja_JP, zh_CN]
# Want to create your own translation? Visit here: https://github.com/TerrorByteTW/Honeypot/wiki/Translating-Honeypot
language: en_US

# If you're providing your own language file, set this to true. If you've incorrectly translated it, though, expect errors in console!
# If you don't know what this is, leave it set to false
bypass-language-check: false

# The number of history entries to return from the '/honeypot history query' command
history-length: 5

######################################################################
#                     F I L T E R   S E T T I N G S                  #
######################################################################

# Enabling these filters will prevent staff from creating honeypot blocks that AREN'T in the respective list below.
filters:
  blocks: false
  inventories: false

# These filter inventory openings and creation of honeypot blocks on inventories. If the filter is enabled and a player tries to open a Honeypot block that has an inventory
# not listed here, they will be allowed to open it without actions being taken. If they try to break the Honeypot, action WILL be taken (Unless block filters are enabled)
allowed-inventories:
  - CHEST
  - FURNACE

# This filter only prevents the creation of these types of honeypots. If a honeypot has been previously created but is not a part of the filter, actions will still apply
# This is to prevent honeypots from being created but not removed upon breaking
allowed-blocks:
  - DIAMOND_ORE

######################################################################
#                   3 R D  P A R T Y  S E T T I N G S                #
######################################################################

# Changing this setting to true will allow players to create Honeypots within GriefPrevention areas if they have build permission there. If they don't, Honeypot creation will be blocked
# Changing this to false will always block Honeypot creation within GriefPrevention areas, even if they have permission to build there.
respect-griefprevention: false

# WorldGuard and Lands both have integrations with this plugin as well; however, they do not have configurable settings.
# WorldGuard will register a flag which can be used to toggle whether Honeypots can be created in a region
# Lands will automatically deny building Honeypots in a claimed area. This is not changeable at the current time.
# Please remember that existing Honeypots will still function normally if an area is claimed where Honeypots already are.

######################################################################
#                       E X P E R I M E N T A L                      #
######################################################################

# Allows you to change the storage provider from SQLite to a separate provider if one exists.
# If you have a custom storage provider, set its name (The author of the provider should give this to you) here and enable third party providers.
# Believe it or not, this *can* be changed on the fly with /honeypot reload! As long as the storage provider was registered on startup, you can switch between them at any time.
storage-method: sqlite

# This is an experimental setting that enables the ability for a third-party storage manager to be used with Honeypot. This is not recommended for most users.
# Developers can create their own storage manager to store Honeypot data in if they don't like SQLite. This allows things like MySQL, H2, PostgreSQL, etc. to be added later on
# If you are a developer and want to use this, please refer to the wiki. Defaults to false.
allow-third-party-storage-managers: false

######################################################################
#                    S Q L I T E    S E T T I N G S                  #
######################################################################

# Honeypot is built on ByteLib and uses its SQLite module for data storage. All of these configuration options come from there.
# For detailed information, please refer to the ByteLib documentation: https://terrorbytetw.github.io/ByteLib/configuring-sqlite-api.html
# Only the settings listed here are configurable (Any extra settings listed in the documentation are hardcoded)

# Changing these settings requires a server restart and could cause significant performance issues or data loss.
# It's recommended to leave them as default unless you know what you're doing.
# Honeypot does not validate these values. If any are invalid, you will experience unexpected errors.
db:
  # The SQLite journal mode to use. WAL is by far the most performant mode that ensures data integrity. However, you may change it
  # to MEMORY if you're wanting to squeeze the most performance out of your server and accept the slight risk of data loss in the event of a crash.
  # Options are DELETE, WAL (Default), TRUNCATE, PERSIST, MEMORY, and OFF.
  journal-mode: "WAL"
  # The amount of time that SQLite will wait to execute a query if a table is locked.
  # Measured in milliseconds, defaults to 5000 (5 seconds)
  busy-timeout: 5000
  # The amount of time that Honeypot will wait for a query on the main thread to complete before timing out
  # Measured in milliseconds, defaults to 50.
  # Increase this if you're experiencing lots of errors in the console about timeouts, have a slow disk, or are using a shared host
  main-thread-timeout: 50
  # Whether to allow Honeypot to query using the main server thread or not. Options are DISALLOW, ALLOW, and WARN (Default)
  # ALLOW will silently allow queries on the main thread, WARN will allow queries on the main thread but trigger slow query warnings. DISALLOW blocks main thread queries entirely and throws an exception
  # NOTE: HONEYPOT CANNOT QUERY ASYNCHRONOUSLY. SETTING TO DISALLOW WILL BREAK HONEYPOT!!!!!!!!! NO SUPPORT WILL BE PROVIDED IF YOU DO THIS
  main-thread-policy: "WARN"
  # Determines what Honeypot will do if a query takes longer than the main-thread-timeout while the main-thread-policy is WARN
  # Options are THROW (Default), FAIL_OPEN, and FAIL_CLOSED
  # FAIL_CLOSED and THROW are (currently) the same thing
  # FAIL_OPEN will cause queries to return nothing, but will not throw an exception. This will cause unexpected behavior.
  timeout-policy: "THROW"
  # If a query takes longer than this amount of time but is still faster than the timeout, Honeypot will log a simple warning message.
  # Increase this if you're experiencing lots of warnings in the console about slow queries, have a slow disk, or are using a shared host
  # Measured in milliseconds, defaults to 30
  slow-query-threshold: 30

cache:
  # How many Honeypots to store in the cache at any given time.
  # Setting this to 0 will disable caching, which will decrease memory usage but heavily increase tick times.
  # Setting this to -1 will disable the max size of the cache. This has the potential to increase memory usage dramatically but will provide the best performance.
  max-size: 1000000
  # How long objects in the cache are valid for, in seconds.
  # The cache is evaluated on each query, so objects may remain in the cache after they are no longer valid.
  # If an object expires but another query is not performed, that object will remain indefinitely.
  # This is unlikely as queries are performed constantly for a lot of things. However, it's still possible.
  ttl: 30
  # How long until a background refresh is allowed to be triggered on an object in the cache.
  # If an object in the cache isn't past its TTL (Meaning it's still considered "valid"), after this amount of time, if the object is queried again, Honeypot will proactively refresh the record anyway
  # Set to >= TTL to refresh at or after expiration (Higher risk of stale objects).
  # Set to < TTL to proactively refresh in the background.
  # Set to <= 0 to disable proactive refresh entirely.
  refresh-after: 10
  # Allows Honeypot to serve stale data from the cache while it's retrieving the most up-to-date information from the database.
  # This can improve performance but may result in incorrect data being used in Honeypot calculations. However, this is exceedingly rare.
  # It's recommended to leave this as true. Setting it as false will require a blocking DB query when an action occurs that requires it but guarantees accurate data.
  serve-stale-while-refreshing: true

